<style>
:root{--bg:#0a0c0f;--panel:#10141a;--border:#1e2733;--accent:#e8a020;--accent2:#3b8beb;--text:#c8d4e0;--dim:#5a6a7a;--red:#e74c3c}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── Тайлы: без анимаций ── */
.leaflet-tile{transition:none!important}
.leaflet-fade-anim .leaflet-tile{opacity:1!important}
.leaflet-tile-loaded{transition:none!important}
.leaflet-zoom-animated{will-change:transform}
.leaflet-control-zoom{display:none!important}

/* ── Header ── */
header{background:var(--panel);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;gap:14px;flex-shrink:0;z-index:1000}
.logo{font-family:'Share Tech Mono',monospace;white-space:nowrap;line-height:1.25}
.logo-l1{font-size:16px;color:var(--accent);letter-spacing:2px}
.logo-l1 span{color:var(--dim)}
.logo-l2{font-size:10.5px;color:#4d6578;letter-spacing:1px;font-weight:600}
.search-wrap{flex:1;max-width:360px;position:relative}
.search-wrap input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:6px 10px 6px 32px;font-family:'Rajdhani',sans-serif;font-size:14px;outline:none;border-radius:4px}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap input::placeholder{color:var(--dim)}
.search-ico{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--dim);pointer-events:none}
.filters{display:flex;gap:4px}
.fbtn{background:var(--bg);border:1px solid var(--border);color:var(--dim);padding:4px 10px;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:.8px;cursor:pointer;border-radius:3px;transition:all .12s;text-transform:uppercase}
.fbtn.on{border-color:var(--accent);color:var(--accent);background:rgba(232,160,32,.08)}
.fbtn:hover:not(.on){border-color:var(--dim);color:var(--text)}
.stats{display:flex;gap:12px;font-size:12px;font-family:'Share Tech Mono',monospace;white-space:nowrap;margin-left:auto}
.stat{color:var(--dim)} .stat b{color:var(--accent);font-weight:400}
.upd{display:flex;align-items:center;gap:6px;font-family:'Share Tech Mono',monospace;font-size:11px}
#upd-status{color:var(--dim)} #upd-status.loading{color:var(--accent)} #upd-status.ok{color:#2ecc71} #upd-status.err{color:var(--red)}
.rbtn{background:none;border:1px solid var(--border);color:var(--dim);padding:3px 8px;font-family:'Share Tech Mono',monospace;font-size:10px;cursor:pointer;border-radius:3px;transition:all .12s}
.rbtn:hover{border-color:var(--accent);color:var(--accent)}

/* ── Layout ── */
.main{display:flex;flex:1;overflow:hidden}
#map{flex:1;background:#0d1117}

/* ── Clusters ── */
.marker-cluster{background:rgba(10,12,15,.85)!important}
.marker-cluster div{background:rgba(232,160,32,.18)!important;color:#e8a020!important;font-family:'Share Tech Mono',monospace!important;font-size:11px!important;border:1px solid rgba(232,160,32,.35)!important}
.marker-cluster-small,.marker-cluster-medium,.marker-cluster-large{background:rgba(10,12,15,.85)!important}

/* ── Selected marker glow ── */
.marker-sel img{
  filter:drop-shadow(0 0 3px #e8a020) drop-shadow(0 0 7px #e8a02066)!important;
  transform:scale(1.75)!important;
  transition:transform .14s,filter .14s
}

/* ── Sidebar ── */
.sidebar{width:300px;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sb-head{padding:11px 15px;border-bottom:1px solid var(--border);font-size:11px;font-family:'Share Tech Mono',monospace;color:var(--dim);letter-spacing:1px;text-transform:uppercase}
.sb-list{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.sb-list::-webkit-scrollbar{width:4px}
.sb-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.li{padding:8px 13px;border-bottom:1px solid rgba(30,39,51,.5);cursor:pointer;transition:background .08s;display:flex;align-items:flex-start;gap:8px}
.li:hover{background:rgba(255,255,255,.03)}
.li.sel{background:rgba(232,160,32,.07);border-left:2px solid var(--accent);padding-left:11px}
.li-ico{width:26px;height:26px;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.li-info{flex:1;min-width:0}
.li-id{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--dim)}
.li-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li-owner{font-size:11px;color:var(--dim);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li-owner b{color:var(--accent2);font-weight:500}
.badge{font-size:9px;font-family:'Share Tech Mono',monospace;padding:2px 5px;border-radius:2px;text-transform:uppercase;letter-spacing:.4px;flex-shrink:0;margin-top:3px}
.badge.au{background:rgba(231,76,60,.15);color:var(--red);border:1px solid rgba(231,76,60,.25)}
.badge.ho{background:rgba(59,139,235,.1);color:var(--accent2);border:1px solid rgba(59,139,235,.2)}
.badge.bi{background:rgba(232,160,32,.1);color:var(--accent);border:1px solid rgba(232,160,32,.2)}
.empty{padding:28px 15px;text-align:center;color:var(--dim);font-size:13px}
.hint{padding:9px 13px;color:var(--dim);font-size:11px;font-family:'Share Tech Mono',monospace;border-bottom:1px solid var(--border)}

/* ── Popup ── */
.leaflet-popup{animation:pop .15s cubic-bezier(.34,1.4,.64,1) both}
@keyframes pop{from{opacity:0;transform:translateY(8px) scale(.94)}to{opacity:1;transform:none}}
.leaflet-popup-content-wrapper{background:#10141a!important;border:1px solid #253040!important;border-radius:6px!important;box-shadow:0 8px 28px rgba(0,0,0,.75)!important;padding:0!important}
.leaflet-popup-content{margin:0!important}
.leaflet-popup-tip-container{display:none}
.leaflet-popup-close-button{color:var(--dim)!important;top:7px!important;right:7px!important}
.leaflet-popup-close-button:hover{color:var(--text)!important;background:none!important}
.pc{font-family:'Rajdhani',sans-serif;min-width:200px;padding:11px 13px}
.ph{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.ph img{width:18px;height:18px;image-rendering:pixelated;flex-shrink:0}
.pt{font-size:15px;font-weight:700;color:#c8d4e0}
.pi{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--dim);margin-bottom:7px}
.pr{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-top:1px solid #1e2733;font-size:13px;gap:10px}
.pl{color:var(--dim);flex-shrink:0}
.pv{color:#c8d4e0;font-weight:600;text-align:right}
.pv.hl{color:#3b8beb} .pv.au{color:#e74c3c}
</style>
</head>

var map = L.map('map', {
  crs: L.CRS.Simple,
  minZoom: -2,
  maxZoom: 5,

  zoomDelta: 0.5,
  wheelPxPerZoomLevel: 80,
  scrollWheelZoom: true,
  zoomControl: false,
  attributionControl: false,
  preferCanvas: false,
});

function g2l(x,y){ return map.unproject([(x+3000)*0.256,(3000-y)*0.256],3); }

L.tileLayer('https://pc.rod-ins.com/resource/web/arizona/map_dark/{z}/{x}/{y}.png',{
  tileSize:256, minNativeZoom:3, maxNativeZoom:3,
  noWrap:true, keepBuffer:8,
  updateWhenIdle:false, updateWhenZooming:false,
}).addTo(map);

map.fitBounds([g2l(-3000,3000),g2l(3000,-3000)]);

function ico(k){
  if(!_ic[k]) _ic[k]=L.icon({iconUrl:IC[k],iconSize:[16,16],iconAnchor:[8,8],popupAnchor:[0,-10]});
  return _ic[k];
}
function hKey(h){ return h.status==='auction'?'house_2':'house_0'; }
function bKey(b){ if(b.owner==='The State') return 'business_1'; if(b.bstatus==='auction') return 'business_2'; return 'business_0'; }

var AH=[],AB=[];

function popup(k,title,sub,rows){
  var h='<div class="pc"><div class="ph"><img src="'+IC[k]+'"><div class="pt">'+title+'</div></div><div class="pi">'+sub+'</div>';
  for(var i=0;i<rows.length;i++) h+='<div class="pr"><span class="pl">'+rows[i][0]+'</span><span class="pv '+(rows[i][2]||'')+'">'+rows[i][1]+'</span></div>';
  return h+'</div>';
}

function buildMarkers(houses,bizs){
  map.closePopup();
  selMark(null);
  map.removeLayer(cgH); map.removeLayer(cgB);
  cgH.clearLayers(); cgB.clearLayers();
  AH=[]; AB=[];

  houses.forEach(function(h){
    var did=h.id-1, k=hKey(h);
    var rows=[['Владелец',h.owner||'—','hl'],['Статус',h.status==='auction'?'🔨 Аукцион':'✅ Занят',h.status==='auction'?'au':'']];
    if(h.hasAuction) rows.push(['Мин. ставка',(h.auMinBet||0).toLocaleString()+' $','au']);
    var m=L.marker(g2l(h.lx,h.ly),{icon:ico(k)});
    m.bindPopup(popup(k,h.name||'Дом','🏠 Дом #'+did,rows),{maxWidth:280,autoPan:true,autoPanPadding:[40,40]});
    m._d={id:h.id,did:did,name:h.name,owner:h.owner,status:h.status,hasAuction:h.hasAuction,auMinBet:h.auMinBet,t:'h',lx:h.lx,ly:h.ly,k:k};
    m.on('click',function(){ onMC(m); });
    m.on('popupclose',function(){ selMark(null); });
    AH.push(m);
  });

  bizs.forEach(function(b){
    var did=b.id-1, k=bKey(b);
    var fr=b.owner==='The State',au=b.bstatus==='auction';
    var st=au?'🔨 Аукцион':fr?'🟢 Свободен':'✅ Занят';
    var tp=BT[b.type]||('Тип '+b.type);
    var rows=[['Владелец',b.owner||'—','hl'],['Статус',st,au?'au':'']];
    var m=L.marker(g2l(b.lx,b.ly),{icon:ico(k)});
    m.bindPopup(popup(k,b.name,'🏪 Бизнес #'+did+' · '+tp,rows),{maxWidth:280,autoPan:true,autoPanPadding:[40,40]});
    m._d={id:b.id,did:did,name:b.name,owner:b.owner,bstatus:b.bstatus,t:'b',lx:b.lx,ly:b.ly,k:k};
    m.on('click',function(){ onMC(m); });
    m.on('popupclose',function(){ selMark(null); });
    AB.push(m);
  });

  renderAll();
}

function setS(t,c){ var e=document.getElementById('upd-status'); e.textContent=t; e.className=c||''; }

function parse(j){
  var H=[],B=[];
  (j.houses.hasOwner||[]).forEach(function(h){h.status='owned';H.push(h);});
  (j.houses.onAuction||[]).forEach(function(h){h.status='auction';H.push(h);});
  (j.houses.noOwner||[]).forEach(function(h){h.status='free';H.push(h);});
  (j.businesses.onAuction||[]).forEach(function(b){b.bstatus='auction';B.push(b);});
  var na=j.businesses.noAuction||{};
  Object.values(na).forEach(function(a){a.forEach(function(b){b.bstatus='owned';B.push(b);});});
  return{H:H,B:B};
}

window.loadData=function(){
  setS('загрузка...','loading');
  fetch(PROXY)
    .then(function(r){if(!r.ok)throw 0;return r.json();})
    .then(function(j){
      var p=parse(j),now=new Date();
      setS('обновлено '+now.getHours()+':'+String(now.getMinutes()).padStart(2,'0'),'ok');
      buildMarkers(p.H,p.B);
    })
    .catch(function(){ setS('офлайн','err'); buildMarkers(FH,FB); });
};

  if(!q)return true;
  return (d.name&&d.name.toLowerCase().indexOf(q)!==-1)||
         (d.owner&&d.owner.toLowerCase().indexOf(q)!==-1)||
         String(d.did)===q;
}

function renderAll(){
  var q=sq.toLowerCase(),hB=[],bB=[];
  if(sH) AH.forEach(function(m){var d=m._d;if(sA&&d.status!=='auction')return;if(!mq(d,q))return;hB.push(m);});
  if(sB) AB.forEach(function(m){var d=m._d;if(sA&&d.bstatus!=='auction')return;if(!mq(d,q))return;bB.push(m);});

  map.removeLayer(cgH); map.removeLayer(cgB);
  cgH.clearLayers(); cgB.clearLayers();
  cgH.addLayers(hB); cgB.addLayers(bB);
  map.addLayer(cgH); map.addLayer(cgB);

  document.getElementById('hc').textContent=hB.length;
  document.getElementById('bc').textContent=bB.length;
  renderSB(hB,bB);
}

function renderSB(hB,bB){
  SI=[];
  hB.forEach(function(m){SI.push(m);});
  bB.forEach(function(m){SI.push(m);});
  document.getElementById('cnt').textContent=SI.length;
  var MAX=300,el=document.getElementById('list'),h='';
  if(!SI.length){el.innerHTML='<div class="empty">Ничего не найдено</div>';return;}
  var lim=Math.min(SI.length,MAX);
  for(var i=0;i<lim;i++){
    var d=SI[i]._d;
    var isH=d.t==='h', isA=d.status==='auction'||d.bstatus==='auction';
    var bg=isH?'rgba(59,139,235,.08)':'rgba(232,160,32,.08)';
    var bdg=isA?'<span class="badge au">АУКЦИОН</span>':isH?'<span class="badge ho">ДОМ</span>':'<span class="badge bi">БИЗ</span>';
    h+='<div class="li" onclick="pick('+i+')"><div class="li-ico" style="background:'+bg+'"><img src="'+IC[d.k]+'" style="width:18px;height:18px;image-rendering:pixelated"></div>'
      +'<div class="li-info"><div class="li-id">#'+d.did+'</div><div class="li-name">'+(d.name||(isH?'Дом':'Бизнес'))+'</div>'
      +'<div class="li-owner">Владелец: <b>'+(d.owner||'—')+'</b></div></div>'+bdg+'</div>';
  }
  if(SI.length>MAX) h+='<div class="hint">Показано '+MAX+' из '+SI.length+'. Уточните поиск.</div>';
  el.innerHTML=h;
}

// Клик по сайдбару — панорама БЕЗ изменения зума, попап строго над маркером
window.pick=function(i){
  var m=SI[i]; if(!m)return;
  if(selLI) selLI.classList.remove('sel');
  var lis=document.querySelectorAll('.li');
  if(lis[i]){lis[i].classList.add('sel');lis[i].scrollIntoView({block:'nearest'});selLI=lis[i];}
  // panTo — только смещаем, НЕ меняем зум
  map.panTo(m.getLatLng(),{animate:true,duration:0.35});
  map.once('moveend',function(){
    selMark(m);
    m.openPopup();
  });
};

function onMC(m){
  selMark(m);
  if(selLI) selLI.classList.remove('sel');
  for(var i=0;i<SI.length;i++){
    if(SI[i]===m){
      var lis=document.querySelectorAll('.li');
      if(lis[i]){lis[i].classList.add('sel');lis[i].scrollIntoView({block:'nearest'});selLI=lis[i];}
      break;
    }
  }
}

document.querySelectorAll('.fbtn').forEach(function(btn){
  btn.addEventListener('click',function(){
    var f=btn.dataset.f;
    if(f==='houses'){sH=!sH;btn.classList.toggle('on',sH);}
    if(f==='businesses'){sB=!sB;btn.classList.toggle('on',sB);}
    if(f==='auction'){sA=!sA;btn.classList.toggle('on',sA);}
    renderAll();
  });
});

var st;
document.getElementById('q').addEventListener('input',function(e){
  clearTimeout(st);
  st=setTimeout(function(){sq=e.target.value.trim();renderAll();},220);
});

loadData();
</script></body></html>
