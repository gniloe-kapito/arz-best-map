<script>
// ── МОБИЛЬНЫЙ SHEET ──────────────────────────────────────────────────────────
window.toggleSheet=function(){
  const sb=document.getElementById('sidebar');
  sb.classList.toggle('open');
};

// Закрывать sheet при тапе на карту — вешаем после загрузки DOM
document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('map').addEventListener('click',function(){
    const sb=document.getElementById('sidebar');
    if(sb.classList.contains('open')) sb.classList.remove('open');
  });
});

// Переопределение pick() — делаем через обёртку после загрузки всего скрипта
window._mobilePickPatch=function(){
  const _origPick=window.pick;
  if(typeof _origPick!=='function') return;
  window.pick=function(i){
    _origPick(i);
    if(window.innerWidth<=768){
      setTimeout(()=>{ document.getElementById('sidebar').classList.remove('open'); },300);
    }
  };
};
</script>
<style>

  /* Попап — фиксированная плашка снизу */

<body>
<div id="offline-screen"><div class="off-icon">📡</div><div class="off-title">НЕТ СОЕДИНЕНИЯ</div><div class="off-sub">Не удалось загрузить данные карты.<br>Проверь подключение к интернету и попробуй снова.</div><button class="off-btn" onclick="location.reload()">↺ &nbsp;ПЕРЕЗАГРУЗИТЬ</button></div><header>
<div class="logo"><div class="logo-l1">🏜 ARIZONA <span>/ QUEEN CREEK</span></div><div class="logo-l2">by Nikitos_Ciganin</div></div>
  <div class="search-wrap"><span class="search-ico">⌕</span><input id="q" type="text" placeholder="Поиск по имени, владельцу, ID..."></div>
  <div class="filters"><button class="fbtn on" data-f="houses">🏠 Дома</button><button class="fbtn on" data-f="businesses">🏪 Бизнесы</button><button class="fbtn" data-f="auction">🔨 Аукцион</button></div>

  <div class="sidebar" id="sidebar"><div class="sb-handle"></div><div class="sb-head" onclick="toggleSheet()">Объекты · <span id="cnt">0</span><span class="sb-arrow">▲</span></div><div class="sb-list" id="list"></div></div>

<script>
var PROXY='https://arz.danvox123hyu.workers.dev';
const ICONS={
  'house_0':'icons/house_0.png',
  'house_1':'icons/house_1.png',
  'house_2':'icons/house_2.png',
  'business_0':'icons/business_0.png',
  'business_1':'icons/business_1.png',
  'business_2':'icons/business_2.png',
};
function mkIcon(k){ return ICONS[k]||ICONS['house_0']; }

const BT={0:'Амуниция/Тир',1:'Бар',2:'Магазин 24/7',3:'Магазин одежды',4:'Городская ферма'};

let allH=[],allB=[],shown=[],selectedId=null,selectedType=null,popupItem=null,sq='',sH=true,sB=true,sA=false,lastSyncTs=0;
const map=new maplibregl.Map({
  container:'map',
  style:{version:8,sources:{},layers:[]},
  center:[0,0],zoom:3,minZoom:2,maxZoom:6,attributionControl:false,dragRotate:false,pitchWithRotate:false,touchPitch:false,touchZoomRotate:false
});

// Отключить вращение двумя пальцами на мобилке
map.touchZoomRotate.disableRotation();

function gameToLngLat(x,y){
  const world=256*Math.pow(2,3);
  const px=(x+3000)*0.256;
  const py=(3000-y)*0.256;
  const lng=(px/world)*360-180;
  const n=Math.PI*(1-(2*py)/world);
  const lat=(180/Math.PI)*Math.atan(Math.sinh(n));
  return [lng,lat];
}
function hKey(h){ if(h.status==='auction')return'house_2'; if(h.status==='free'||h.owner==='The State')return'house_1'; return'house_0'; }
function bKey(b){ if(b.bstatus==='auction')return'business_2'; if(b.owner==='The State')return'business_1'; return'business_0'; }



function loadMapImages(cb){
  const keys=['house_0','house_1','house_2','business_0','business_1','business_2'];
  let done=0;
  keys.forEach(k=>{
    const img=new Image(16,16);
    img.onload=function(){
      if(!map.hasImage(k)) map.addImage(k,img);
      if(++done===keys.length) cb();
    };
    img.onerror=function(){ if(++done===keys.length) cb(); };
    img.src=ICONS[k];
  });
}

function setSources(){
  // ── ТАЙЛОВЫЙ ФОН 6000×6000 → сетка 12×12 по 500px ──────────────────────
  // Координаты вычисляются через gameToLngLat по пиксельным границам тайлов,
  // чтобы учесть нелинейность проекции Меркатора (иначе верх вытягивается)
  const COLS = 12, ROWS = 12;
  const TILE_PX = 500; // 6000 / 12 = 500px на тайл
  const GAME_SIZE = 6000; // игровые единицы всей карты
  const GAME_HALF = 3000;

  // Перевод пикселя тайловой сетки → игровые координаты → lngLat
  function tilePixelToLngLat(px, py) {
    const gx = (px / GAME_SIZE) * GAME_SIZE - GAME_HALF;
    const gy = GAME_HALF - (py / GAME_SIZE) * GAME_SIZE;
    return gameToLngLat(gx, gy);
  }

  for(let row=0; row<ROWS; row++){
    for(let col=0; col<COLS; col++){
      const px0 = col * TILE_PX,       py0 = row * TILE_PX;
      const px1 = (col + 1) * TILE_PX, py1 = (row + 1) * TILE_PX;

      const nw = tilePixelToLngLat(px0, py0);
      const ne = tilePixelToLngLat(px1, py0);
      const se = tilePixelToLngLat(px1, py1);
      const sw = tilePixelToLngLat(px0, py1);

      const sid = `fone-${col}-${row}`;
      map.addSource(sid,{
        type:'image',
        url:`tiles/${col}_${row}.png`,
        coordinates:[nw, ne, se, sw]
      });
      map.addLayer({
        id:`fone-layer-${col}-${row}`,
        type:'raster',
        source:sid,
        paint:{'raster-opacity':1}
      });
    }
  }
  // ────────────────────────────────────────────────────────────────────────
  map.addSource('houses',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
  map.addSource('biz',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
  map.addSource('selected',{type:'geojson',data:{type:'FeatureCollection',features:[]}});

  // Symbol слои с реальными PNG иконками
  map.addLayer({id:'houses-points',type:'symbol',source:'houses',layout:{
    'icon-image':['get','icon'],
    'icon-size':0.9,
    'icon-allow-overlap':true,
    'icon-ignore-placement':true,
  }});
  map.addLayer({id:'biz-points',type:'symbol',source:'biz',layout:{
    'icon-image':['get','icon'],
    'icon-size':0.9,
    'icon-allow-overlap':true,
    'icon-ignore-placement':true,
  }});

  // Выделение — подсветка кружком под иконкой
  map.addLayer({id:'selected-glow-outer',type:'circle',source:'selected',paint:{'circle-radius':22,'circle-color':'#e8a020','circle-opacity':0.15,'circle-stroke-width':2,'circle-stroke-color':'#e8a020','circle-stroke-opacity':0.6}});
  map.addLayer({id:'selected-glow',type:'circle',source:'selected',paint:{'circle-radius':15,'circle-color':'#e8a020','circle-opacity':0.45,'circle-stroke-width':2,'circle-stroke-color':'#fff','circle-stroke-opacity':0.9}});
  map.addLayer({id:'selected-point',type:'symbol',source:'selected',layout:{
    'icon-image':['get','icon'],
    'icon-size':1.8,
    'icon-allow-overlap':true,
    'icon-ignore-placement':true,
  }});
  sourcesReady=true;
  // Если данные уже загружены из кэша до setSources() — отрисуем их сейчас
  render();
}

function setMapBounds(){
  const nw=gameToLngLat(-3000,3000);
  const se=gameToLngLat(3000,-3000);
  const bounds=[[nw[0],se[1]],[se[0],nw[1]]];
  map.fitBounds(bounds,{padding:10,duration:0});
  map.setMaxBounds(bounds);
}

function fmtTimeLeft(ts){
  if(!ts) return null;
  const diff=ts*1000-Date.now();
  if(diff<=0) return 'завершён';
  const h=Math.floor(diff/3600000);
  const m=Math.floor((diff%3600000)/60000);
  if(h>=24){ const d=Math.floor(h/24); return d+'д '+(h%24)+'ч'; }
  if(h>0) return h+'ч '+m+'мин';
  return m+'мин';
}

function popupHtml(d){
  const isH=d.t==='h',au=d.status==='auction'||d.bstatus==='auction';
  const status=au?'🔨 Аукцион':(d.owner==='The State'?'🟢 Свободен':'✅ Занят');
  const sub=isH?`🏠 Дом #${d.did}`:`🏪 Бизнес #${d.did} · ${(BT[d.type]||('Тип '+d.type))}`;
  let extra='';
  if(au){
    if(d.auStartPrice) extra+=`<div class="pr"><span class="pl">Старт. цена</span><span class="pv au">${Number(d.auStartPrice).toLocaleString()} $</span></div>`;
    if(d.auMinBet)     extra+=`<div class="pr"><span class="pl">Мин. ставка</span><span class="pv au">${Number(d.auMinBet).toLocaleString()} $</span></div>`;
    const tl=fmtTimeLeft(d.auTimeEnd);
    if(tl) extra+=`<div class="pr"><span class="pl">Осталось</span><span class="pv au">⏱ ${tl}</span></div>`;
  }
  return `<div class="pc"><div class="ph"><img src="${mkIcon(d.k||'house_0')}"><div class="pt">${d.name||'Объект'}</div></div><div class="pi">${sub}</div><div class="pr"><span class="pl">Владелец</span><span class="pv hl">${d.owner||'—'}</span></div><div class="pr"><span class="pl">Статус</span><span class="pv ${au?'au':''}">${status}</span></div>${extra}</div>`;
}

function positionPopup(){ if(!popupItem)return; const p=map.project(popupItem.geometry.coordinates); const mapEl=document.getElementById('map'); const main=mapEl.parentElement.getBoundingClientRect(); const mr=mapEl.getBoundingClientRect(); const el=document.getElementById('custom-popup'); el.style.left=(mr.left-main.left+p.x)+'px'; el.style.top=(mr.top-main.top+p.y)+'px'; }
function showPopup(feature){ popupItem=feature; document.getElementById('cp-body').innerHTML=popupHtml(feature.properties); const el=document.getElementById('custom-popup'); el.classList.add('visible'); positionPopup(); }
window.closePopup=function(){ popupItem=null; document.getElementById('custom-popup').classList.remove('visible'); setSelected(null,null); };

function setSelected(id,t){ selectedId=id; selectedType=t; const f=id?shown.find(x=>x.properties.id===id&&x.properties.t===t):null; map.getSource('selected').setData({type:'FeatureCollection',features:f?[f]:[]}); renderSidebar(); }

function mq(d,q){ if(!q)return true; var id=Number(d.id); var sid=Number.isFinite(id)?id-1:null; return (d.name||'').toLowerCase().includes(q)||(d.owner||'').toLowerCase().includes(q)||String(d.id)===q||String(sid)===q||('#'+String(d.id))===q||('#'+String(sid))===q; }

let sourcesReady=false;
function render(){
  const q=sq.toLowerCase();
  const hf=sH?allH.filter(d=>(!sA||d.status==='auction')&&mq(d,q)):[];
  const bf=sB?allB.filter(d=>(!sA||d.bstatus==='auction')&&mq(d,q)):[];
  document.getElementById('hc').textContent=hf.length; document.getElementById('bc').textContent=bf.length;
  const hFeat=hf.map(d=>({type:'Feature',geometry:{type:'Point',coordinates:gameToLngLat(d.lx,d.ly)},properties:{...d,t:'h',did:d.id-1,sid:d.id-1,id:d.id,k:hKey(d),icon:hKey(d)}}));
  const bFeat=bf.map(d=>({type:'Feature',geometry:{type:'Point',coordinates:gameToLngLat(d.lx,d.ly)},properties:{...d,t:'b',did:d.id-1,sid:d.id-1,id:d.id,k:bKey(d),icon:bKey(d)}}));
  shown=[...hFeat,...bFeat];
  if(!sourcesReady||!map.getSource('houses')||!map.getSource('biz')) return;
  map.getSource('houses').setData({type:'FeatureCollection',features:hFeat});
  map.getSource('biz').setData({type:'FeatureCollection',features:bFeat});
  setSelected(selectedId,selectedType);
}

function renderSidebar(){
  document.getElementById('cnt').textContent=shown.length; const el=document.getElementById('list');
  if(!shown.length){el.innerHTML='<div class="empty">Ничего не найдено</div>';return;}
  const items=shown.map((f,i)=>{const d=f.properties; const isH=d.t==='h',isA=d.status==='auction'||d.bstatus==='auction'; const sel=(selectedId===d.id&&selectedType===d.t)?' sel':''; const bdg=isA?'<span class="badge au">АУКЦИОН</span>':isH?'<span class="badge ho">ДОМ</span>':'<span class="badge bi">БИЗ</span>'; return `<div class="li${sel}" onclick="pick(${i})"><div class="li-ico" style="background:${isH?'rgba(59,139,235,.08)':'rgba(232,160,32,.08)'}"><img src="${mkIcon(d.k||'house_0')}" style="width:18px;height:18px;image-rendering:pixelated"></div><div class="li-info"><div class="li-id">#${d.sid}</div><div class="li-name">${d.name||'Объект'}</div><div class="li-owner">Владелец: <b>${d.owner||'—'}</b></div></div>${bdg}</div>`;}).join('');
  el.innerHTML=items;
}

window.pick=function(i){ const f=shown[i]; if(!f) return; map.flyTo({center:f.geometry.coordinates,zoom:Math.max(map.getZoom(),4)}); setSelected(f.properties.id,f.properties.t); showPopup(f); };
// Применяем мобильный патч сразу после определения pick
if(typeof window._mobilePickPatch==='function') window._mobilePickPatch();

function parse(j){
  const H=[],B=[];
  (j.houses.hasOwner||[]).forEach(h=>{h.status=h.hasAuction?'auction':'owned';H.push(h)});
  (j.houses.onAuction||[]).forEach(h=>{h.status='auction';H.push(h)});
  (j.houses.noOwner||[]).forEach(h=>{h.status='free';H.push(h)});
  if(!H.length&&Array.isArray(j.houses)){
    j.houses.forEach(h=>{h.status=h.hasAuction?'auction':(h.owner&&h.owner!=='The State'?'owned':'free');H.push(h);});
  }
  (j.businesses.onAuction||[]).forEach(b=>{b.bstatus='auction';B.push(b)});
  const na=j.businesses.noAuction||{};
  if(Array.isArray(na)){
    na.forEach(b=>{if(b){b.bstatus=b.hasAuction?'auction':'owned';B.push(b);}});
  }else{
    Object.values(na).forEach(arr=>{
      if(Array.isArray(arr)) arr.forEach(b=>{if(b){b.bstatus=b.hasAuction?'auction':'owned';B.push(b);}});
    });
  }
  if(!B.length&&Array.isArray(j.businesses)){
    j.businesses.forEach(b=>{b.bstatus=b.hasAuction?'auction':'owned';B.push(b);});
  }
  return {H,B};
}
function setS(t,c){const e=document.getElementById('upd-status');e.textContent=t;e.className=c||'';}

function saveCache(){
  localStorage.setItem('qc-map-cache',JSON.stringify({houses:allH,businesses:allB,ts:Date.now()}));
}

function restoreCache(){
  try{
    const raw=localStorage.getItem('qc-map-cache');
    if(!raw) return false;
    const c=JSON.parse(raw);
    if(!Array.isArray(c.houses)||!Array.isArray(c.businesses)) return false;
    allH=c.houses; allB=c.businesses; lastSyncTs=c.ts||0;
    render();
    return true;
  }catch(_){ return false; }
}

function unwrapPayload(j){
  if(!j || typeof j!=='object') return null;
  if(j.houses && j.businesses) return j;
  if(j.data && j.data.houses && j.data.businesses) return j.data;
  if(j.result && j.result.houses && j.result.businesses) return j.result;
  return null;
}

async function fetchData(){
  const r=await fetch(PROXY+'/map/21',{cache:'no-store'});
  if(!r.ok) throw new Error('http '+r.status);
  return r.json();
}

window.loadData=function(){
  setS('загрузка...','loading');
  fetchData()
    .then(raw=>{
      const payload=unwrapPayload(raw);
      if(!payload) throw new Error('bad payload');
      const parsed=parse(payload);
      if(!parsed.H.length && !parsed.B.length) throw new Error('empty payload');
      allH=parsed.H;
      allB=parsed.B;
      lastSyncTs=Date.now();
      saveCache();
      const n=new Date(lastSyncTs);
      setS(`обновлено ${n.getHours()}:${String(n.getMinutes()).padStart(2,'0')}`,'ok');
      document.getElementById('offline-screen').classList.remove('show');
      render();
    })
    .catch((err)=>{console.error('loadData error:',err);
      const hasCache=restoreCache();
      if(hasCache){
        const n=new Date(lastSyncTs);
        setS(`офлайн · кэш ${n.getHours()}:${String(n.getMinutes()).padStart(2,'0')}`,'err');
        document.getElementById('offline-screen').classList.remove('show');
      }else{
        setS('офлайн','err');
        document.getElementById('offline-screen').classList.add('show');
      }
      render();
    });
};

let appInit=false;
async function initApp(){
  if(appInit) return;
  if(!map.isStyleLoaded()) return;
  appInit=true;
  loadMapImages(function(){
  setSources();
  setMapBounds();
  map.resize(); // Пересчитать canvas после установки bounds
  map.on('click','houses-points',e=>{const f=e.features[0];setSelected(f.properties.id,f.properties.t);showPopup(f);});
  map.on('click','biz-points',e=>{const f=e.features[0];setSelected(f.properties.id,f.properties.t);showPopup(f);});
  map.on('move zoom',positionPopup);
  restoreCache();
  loadData();
  setInterval(loadData,120000);
  });
}

map.on('styledata',initApp);
setTimeout(initApp,1200);

window.addEventListener('resize', function(){ map.resize(); });
map.once('load', function(){
  setTimeout(function(){ map.resize(); }, 300);
});

document.querySelectorAll('.fbtn').forEach(btn=>btn.addEventListener('click',()=>{const f=btn.dataset.f;if(f==='houses'){sH=!sH;btn.classList.toggle('on',sH)}if(f==='businesses'){sB=!sB;btn.classList.toggle('on',sB)}if(f==='auction'){sA=!sA;btn.classList.toggle('on',sA)}render();}));
let st;document.getElementById('q').addEventListener('input',e=>{clearTimeout(st);st=setTimeout(()=>{sq=e.target.value.trim();render();},220)});
document.addEventListener('mousedown',e=>{const p=document.getElementById('custom-popup');if(!p.classList.contains('visible'))return;const wrap=p.querySelector('.cp-wrap');if(wrap&&!wrap.contains(e.target))closePopup();});

</script>
