<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Queen Creek Map — Arizona RP (MapLibre)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<style>
:root{--bg:#0a0c0f;--panel:#10141a;--border:#1e2733;--accent:#e8a020;--accent2:#3b8beb;--text:#c8d4e0;--dim:#5a6a7a;--red:#e74c3c}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{background:var(--panel);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;gap:14px;flex-shrink:0;z-index:1000}
.logo{font-family:'Share Tech Mono',monospace;white-space:nowrap;line-height:1.25}
.logo-l1{font-size:16px;color:var(--accent);letter-spacing:2px}.logo-l1 span{color:var(--dim)}
.logo-l2{font-size:10.5px;color:#4d6578;letter-spacing:1px;font-weight:600}
.search-wrap{flex:1;max-width:360px;position:relative}
.search-wrap input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:6px 10px 6px 32px;font-family:'Rajdhani',sans-serif;font-size:14px;outline:none;border-radius:4px}
.search-wrap input:focus{border-color:var(--accent)}.search-wrap input::placeholder{color:var(--dim)}
.search-ico{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--dim);pointer-events:none}
.filters{display:flex;gap:4px}.fbtn{background:var(--bg);border:1px solid var(--border);color:var(--dim);padding:4px 10px;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:.8px;cursor:pointer;border-radius:3px;transition:all .12s;text-transform:uppercase}
.fbtn.on{border-color:var(--accent);color:var(--accent);background:rgba(232,160,32,.08)}
.stats{display:flex;gap:12px;font-size:12px;font-family:'Share Tech Mono',monospace;white-space:nowrap;margin-left:auto}
.stat{color:var(--dim)} .stat b{color:var(--accent);font-weight:400}
.upd{display:flex;align-items:center;gap:6px;font-family:'Share Tech Mono',monospace;font-size:11px}
#upd-status{color:var(--dim)} #upd-status.loading{color:var(--accent)} #upd-status.ok{color:#2ecc71} #upd-status.err{color:var(--red)}
.rbtn{background:none;border:1px solid var(--border);color:var(--dim);padding:3px 8px;font-family:'Share Tech Mono',monospace;font-size:10px;cursor:pointer;border-radius:3px}
.main{display:flex;flex:1;overflow:hidden;background:#030916}#map{flex:1;background:#0d1117 url('https://upload.wikimedia.org/wikipedia/commons/8/83/GTA_San_Andreas_map.jpg') center/cover no-repeat}.sidebar{width:300px;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sb-head{padding:11px 15px;border-bottom:1px solid var(--border);font-size:11px;font-family:'Share Tech Mono',monospace;color:var(--dim)}
.sb-list{flex:1;overflow-y:auto}.li{padding:8px 13px;border-bottom:1px solid rgba(30,39,51,.5);cursor:pointer;display:flex;align-items:flex-start;gap:8px}
.li.sel{background:rgba(232,160,32,.07);border-left:2px solid var(--accent);padding-left:11px}.li-ico{width:26px;height:26px;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.li-info{flex:1;min-width:0}.li-id{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--dim)}.li-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li-owner{font-size:11px;color:var(--dim)}.li-owner b{color:var(--accent2);font-weight:500}.badge{font-size:9px;font-family:'Share Tech Mono',monospace;padding:2px 5px;border-radius:2px}
.badge.au{background:rgba(231,76,60,.15);color:var(--red)}.badge.ho{background:rgba(59,139,235,.1);color:var(--accent2)}.badge.bi{background:rgba(232,160,32,.1);color:var(--accent)}
.empty{padding:28px 15px;text-align:center;color:var(--dim);font-size:13px}
#custom-popup{position:absolute;z-index:9999;display:none;pointer-events:none;width:0;height:0;overflow:visible}
#custom-popup.visible{display:block}.cp-wrap{position:relative;background:#10141a;border:1px solid #253040;border-radius:6px;box-shadow:0 8px 28px rgba(0,0,0,.75);min-width:220px;transform:translateX(-50%) translateY(calc(-100% - 14px));pointer-events:auto}
.cp-close{position:absolute;top:6px;right:8px;background:none;border:none;color:#5a6a7a;font-size:16px;cursor:pointer}.pc{padding:11px 28px 11px 13px}
.ph{display:flex;align-items:center;gap:8px;margin-bottom:4px}.ph img{width:18px;height:18px;image-rendering:pixelated}.pt{font-size:15px;font-weight:700}
.pi{font-family:'Share Tech Mono',monospace;font-size:10px;color:#e8a020;opacity:.75;margin-bottom:8px}.pr{display:flex;justify-content:space-between;padding:4px 0;border-top:1px solid #1e2733;font-size:13px}
.pl{color:var(--dim)}.pv.hl{color:#3b8beb}.pv.au{color:#e74c3c}
</style>
</head>
<body>
<header>
  <div class="logo"><div class="logo-l1">🏜 ARIZONA <span>/ QUEEN CREEK</span></div><div class="logo-l2">MapLibre rewrite</div></div>
  <div class="search-wrap"><span class="search-ico">⌕</span><input id="q" type="text" placeholder="Поиск по имени, владельцу, ID..."></div>
  <div class="filters"><button class="fbtn on" data-f="houses">🏠 Дома</button><button class="fbtn on" data-f="businesses">🏪 Бизнесы</button><button class="fbtn" data-f="auction">🔨 Аукцион</button></div>
  <div class="stats"><div class="stat">Домов: <b id="hc">0</b></div><div class="stat">Бизнесов: <b id="bc">0</b></div></div>
  <div class="upd"><span id="upd-status">—</span><button class="rbtn" onclick="loadData()">↺ обновить</button></div>
</header>
<div class="main">
  <div id="map"></div>
  <div id="custom-popup"><div class="cp-wrap"><button class="cp-close" onclick="closePopup()">×</button><div id="cp-body"></div></div></div>
  <div class="sidebar"><div class="sb-head">Объекты · <span id="cnt">0</span></div><div class="sb-list" id="list"></div></div>
</div>
<script>
var PROXY='https://arz.danvox123hyu.workers.dev';
const TILE='https://pc.rod-ins.com/resource/web/arizona/map_dark/{z}/{x}/{y}.png';
const MAP_BG='https://static.wikia.nocookie.net/gtawiki/images/a/a6/StateofSanAndreas-GTASA-TerrainMap.jpg/revision/latest?cb=20140207210705';
const BT={0:'Амуниция/Тир',1:'Бар',2:'Магазин 24/7',3:'Магазин одежды',4:'Городская ферма'};
const ICON={house_0:['#3b8beb','🏠'],house_2:['#e74c3c','🔨'],business_0:['#e8a020','🏪'],business_1:['#2ecc71','🏪'],business_2:['#e74c3c','🔨']};

let allH=[],allB=[],shown=[],selectedId=null,selectedType=null,popupItem=null,sq='',sH=true,sB=true,sA=false,lastSyncTs=0;
const map=new maplibregl.Map({
  container:'map',
  style:{version:8,sources:{
    bgimg:{type:'image',url:MAP_BG,coordinates:[[-180,85.0511287798066],[90,85.0511287798066],[90,-66.51326044311186],[-180,-66.51326044311186]]},
    bg:{type:'raster',tiles:[TILE],tileSize:256,minzoom:0,maxzoom:6}
  },layers:[
    {id:'bgimg',type:'raster',source:'bgimg'},
    {id:'bg',type:'raster',source:'bg','paint':{'raster-opacity':0.92}}
  ]},
  center:[0,0],zoom:3,minZoom:2,maxZoom:6,attributionControl:false,dragRotate:false,pitchWithRotate:false
});

function gameToLngLat(x,y){
  const world=256*Math.pow(2,3);
  const px=(x+3000)*0.256;
  const py=(3000-y)*0.256;
  const lng=(px/world)*360-180;
  const n=Math.PI*(1-(2*py)/world);
  const lat=(180/Math.PI)*Math.atan(Math.sinh(n));
  return [lng,lat];
}
function hKey(h){ return h.status==='auction'?'house_2':'house_0'; }
function bKey(b){ if(b.owner==='The State')return'business_1'; if(b.bstatus==='auction')return'business_2'; return'business_0'; }
function mkIcon(){ return 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8/x8AAwMCAO7ZxioAAAAASUVORK5CYII='; }

function setupImages(){ return Promise.resolve(); }

function setSources(){
  map.addSource('houses',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
  map.addSource('biz',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
  map.addSource('selected',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
  map.addLayer({id:'houses-points',type:'circle',source:'houses',paint:{
    'circle-radius':['case',['==',['get','icon'],'house_2'],3.6,3.2],
    'circle-color':['case',['==',['get','icon'],'house_2'],'#ff6a3d','#ff2a2a'],
    'circle-stroke-color':'#1b0000','circle-stroke-width':0.8
  }});
  map.addLayer({id:'biz-points',type:'circle',source:'biz',paint:{
    'circle-radius':['case',['==',['get','icon'],'business_2'],3.8,['==',['get','icon'],'business_1'],3.2,3.5],
    'circle-color':['case',
      ['==',['get','icon'],'business_1'],'#1dd75b',
      ['==',['get','icon'],'business_2'],'#ff983d',
      '#ffd43b'
    ],
    'circle-stroke-color':'#221500','circle-stroke-width':0.8
  }});
  map.addLayer({id:'selected-glow',type:'circle',source:'selected',paint:{'circle-radius':14,'circle-color':'#e8a020','circle-opacity':0.2}});
  map.addLayer({id:'selected-point',type:'circle',source:'selected',paint:{'circle-radius':7,'circle-color':'#ffffff','circle-stroke-color':'#e8a020','circle-stroke-width':2}});
}

function setMapBounds(){
  const nw=gameToLngLat(-3000,3000);
  const se=gameToLngLat(3000,-3000);
  const bounds=[[nw[0],se[1]],[se[0],nw[1]]];
  map.fitBounds(bounds,{padding:10,duration:0});
  map.setMaxBounds(bounds);
}

function popupHtml(d){
  const isH=d.t==='h',au=d.status==='auction'||d.bstatus==='auction';
  const status=au?'🔨 Аукцион':(d.owner==='The State'?'🟢 Свободен':'✅ Занят');
  const sub=isH?`🏠 Дом #${d.did}`:`🏪 Бизнес #${d.did} · ${(BT[d.type]||('Тип '+d.type))}`;
  return `<div class="pc"><div class="ph"><img src="${mkIcon()}"><div class="pt">${d.name||'Объект'}</div></div><div class="pi">${sub}</div><div class="pr"><span class="pl">Владелец</span><span class="pv hl">${d.owner||'—'}</span></div><div class="pr"><span class="pl">Статус</span><span class="pv ${au?'au':''}">${status}</span></div></div>`;
}

function positionPopup(){ if(!popupItem)return; const p=map.project(popupItem.geometry.coordinates); const mapEl=document.getElementById('map'); const main=mapEl.parentElement.getBoundingClientRect(); const mr=mapEl.getBoundingClientRect(); const el=document.getElementById('custom-popup'); el.style.left=(mr.left-main.left+p.x)+'px'; el.style.top=(mr.top-main.top+p.y)+'px'; }
function showPopup(feature){ popupItem=feature; document.getElementById('cp-body').innerHTML=popupHtml(feature.properties); const el=document.getElementById('custom-popup'); el.classList.add('visible'); positionPopup(); }
window.closePopup=function(){ popupItem=null; document.getElementById('custom-popup').classList.remove('visible'); setSelected(null,null); };

function setSelected(id,t){ selectedId=id; selectedType=t; const f=id?shown.find(x=>x.properties.id===id&&x.properties.t===t):null; map.getSource('selected').setData({type:'FeatureCollection',features:f?[f]:[]}); renderSidebar(); }

function mq(d,q){ if(!q)return true; var id=Number(d.id); var sid=Number.isFinite(id)?id-1:null; return (d.name||'').toLowerCase().includes(q)||(d.owner||'').toLowerCase().includes(q)||String(d.id)===q||String(sid)===q||('#'+String(d.id))===q||('#'+String(sid))===q; }

function render(){
  const q=sq.toLowerCase();
  const hf=sH?allH.filter(d=>(!sA||d.status==='auction')&&mq(d,q)):[];
  const bf=sB?allB.filter(d=>(!sA||d.bstatus==='auction')&&mq(d,q)):[];
  document.getElementById('hc').textContent=hf.length; document.getElementById('bc').textContent=bf.length;
  const hFeat=hf.map(d=>({type:'Feature',geometry:{type:'Point',coordinates:gameToLngLat(d.lx,d.ly)},properties:{...d,t:'h',did:d.id-1,sid:d.id-1,id:d.id,k:hKey(d),icon:hKey(d)}}));
  const bFeat=bf.map(d=>({type:'Feature',geometry:{type:'Point',coordinates:gameToLngLat(d.lx,d.ly)},properties:{...d,t:'b',did:d.id-1,sid:d.id-1,id:d.id,k:bKey(d),icon:bKey(d)}}));
  shown=[...hFeat,...bFeat];
  map.getSource('houses').setData({type:'FeatureCollection',features:hFeat});
  map.getSource('biz').setData({type:'FeatureCollection',features:bFeat});
  setSelected(selectedId,selectedType);
}

function renderSidebar(){
  document.getElementById('cnt').textContent=shown.length; const el=document.getElementById('list');
  if(!shown.length){el.innerHTML='<div class="empty">Ничего не найдено</div>';return;}
  const items=shown.map((f,i)=>{const d=f.properties; const isH=d.t==='h',isA=d.status==='auction'||d.bstatus==='auction'; const sel=(selectedId===d.id&&selectedType===d.t)?' sel':''; const bdg=isA?'<span class="badge au">АУКЦИОН</span>':isH?'<span class="badge ho">ДОМ</span>':'<span class="badge bi">БИЗ</span>'; return `<div class="li${sel}" onclick="pick(${i})"><div class="li-ico" style="background:${isH?'rgba(59,139,235,.08)':'rgba(232,160,32,.08)'}"><img src="${mkIcon()}" style="width:18px;height:18px"></div><div class="li-info"><div class="li-id">#${d.sid}</div><div class="li-name">${d.name||'Объект'}</div><div class="li-owner">Владелец: <b>${d.owner||'—'}</b></div></div>${bdg}</div>`;}).join('');
  el.innerHTML=items;
}

window.pick=function(i){ const f=shown[i]; if(!f) return; map.flyTo({center:f.geometry.coordinates,zoom:Math.max(map.getZoom(),4)}); setSelected(f.properties.id,f.properties.t); showPopup(f); };

function parse(j){
  const H=[],B=[];
  (j.houses.hasOwner||[]).forEach(h=>{h.status='owned';H.push(h)});
  (j.houses.onAuction||[]).forEach(h=>{h.status='auction';H.push(h)});
  (j.houses.noOwner||[]).forEach(h=>{h.status='free';H.push(h)});
  (j.businesses.onAuction||[]).forEach(b=>{b.bstatus='auction';B.push(b)});
  const na=j.businesses.noAuction||{};
  if(Array.isArray(na)){
    na.forEach(b=>{if(b){b.bstatus='owned';B.push(b);}});
  }else{
    Object.values(na).forEach(arr=>{
      if(Array.isArray(arr)) arr.forEach(b=>{if(b){b.bstatus='owned';B.push(b);}});
    });
  }
  return {H,B};
}
function setS(t,c){const e=document.getElementById('upd-status');e.textContent=t;e.className=c||'';}

function saveCache(){
  localStorage.setItem('qc-map-cache',JSON.stringify({houses:allH,businesses:allB,ts:Date.now()}));
}

function restoreCache(){
  try{
    const raw=localStorage.getItem('qc-map-cache');
    if(!raw) return false;
    const c=JSON.parse(raw);
    if(!Array.isArray(c.houses)||!Array.isArray(c.businesses)) return false;
    allH=c.houses; allB=c.businesses; lastSyncTs=c.ts||0;
    render();
    return true;
  }catch(_){ return false; }
}

function unwrapPayload(j){
  if(!j || typeof j!=='object') return null;
  if(j.houses && j.businesses) return j;
  if(j.data && j.data.houses && j.data.businesses) return j.data;
  if(j.result && j.result.houses && j.result.businesses) return j.result;
  return null;
}

async function fetchData(){
  const r=await fetch(PROXY,{cache:'no-store'});
  if(!r.ok) throw new Error('http '+r.status);
  return r.json();
}

window.loadData=function(){
  setS('загрузка...','loading');
  fetchData()
    .then(raw=>{
      const payload=unwrapPayload(raw);
      if(!payload) throw new Error('bad payload');
      const parsed=parse(payload);
      if(!parsed.H.length && !parsed.B.length) throw new Error('empty payload');
      allH=parsed.H;
      allB=parsed.B;
      lastSyncTs=Date.now();
      saveCache();
      const n=new Date(lastSyncTs);
      setS(`обновлено ${n.getHours()}:${String(n.getMinutes()).padStart(2,'0')}`,'ok');
      render();
    })
    .catch(()=>{
      const hasCache=restoreCache();
      if(hasCache){
        const n=new Date(lastSyncTs);
        setS(`офлайн · кэш ${n.getHours()}:${String(n.getMinutes()).padStart(2,'0')}`,'err');
      }else{
        setS('офлайн','err');
      }
      render();
    });
};

let appInit=false;
async function initApp(){
  if(appInit) return;
  if(!map.isStyleLoaded()) return;
  appInit=true;
  setSources();
  setMapBounds();
  map.on('click','houses-points',e=>{const f=e.features[0];setSelected(f.properties.id,f.properties.t);showPopup(f);});
  map.on('click','biz-points',e=>{const f=e.features[0];setSelected(f.properties.id,f.properties.t);showPopup(f);});
  map.on('move zoom',positionPopup);
  restoreCache();
  loadData();
  setInterval(loadData,120000);
}

map.on('styledata',initApp);
setTimeout(initApp,1200);

document.querySelectorAll('.fbtn').forEach(btn=>btn.addEventListener('click',()=>{const f=btn.dataset.f;if(f==='houses'){sH=!sH;btn.classList.toggle('on',sH)}if(f==='businesses'){sB=!sB;btn.classList.toggle('on',sB)}if(f==='auction'){sA=!sA;btn.classList.toggle('on',sA)}render();}));
let st;document.getElementById('q').addEventListener('input',e=>{clearTimeout(st);st=setTimeout(()=>{sq=e.target.value.trim();render();},220)});
document.addEventListener('mousedown',e=>{const p=document.getElementById('custom-popup');if(!p.classList.contains('visible'))return;const wrap=p.querySelector('.cp-wrap');if(wrap&&!wrap.contains(e.target))closePopup();});
</script>
</body>
</html>
